version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: livechat_mongo
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: livechat_backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/livechat
      - JWT_SECRET_KEY=change-this-in-production
      - SECRET_KEY=change-this-in-production
      - FLASK_ENV=development
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
    command: python run.py

volumes:
  mongo_data:
